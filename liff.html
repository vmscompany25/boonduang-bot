<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>บุญดวง 🔮</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans Thai', sans-serif;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  transition: background 0.6s ease;
}
.wrap { width: 100%; max-width: 380px; position: relative; }

.card {
  border-radius: 28px;
  border: 2px solid var(--accent-40);
  overflow: hidden;
  box-shadow: 0 20px 60px var(--bg-60), 0 0 0 1px var(--accent-20);
  position: relative;
  margin-bottom: 16px;
  background: linear-gradient(135deg, var(--bg), var(--bg-aa));
}

/* particles */
.particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.particle {
  position: absolute; border-radius: 50%;
  background: var(--accent); opacity: 0.35;
  animation: float var(--dur) ease-in-out var(--delay) infinite alternate;
}
@keyframes float {
  from { transform: translateY(0) rotate(0deg); }
  to   { transform: translateY(-18px) rotate(180deg); }
}

/* topbar */
.topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px 8px; position: relative; z-index: 1;
}
.brand-label { font-size: 11px; color: var(--accent-cc); letter-spacing: 2px; text-transform: uppercase; }
.date-label  { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 2px; }
.day-badge {
  background: var(--accent-25); border: 1px solid var(--accent-50);
  border-radius: 12px; padding: 6px 12px;
  font-size: 13px; color: var(--accent); font-weight: 600;
}

/* mascot */
.mascot-area {
  text-align: center; padding: 20px 20px 16px;
  position: relative; z-index: 1;
}
.glow-ring-wrap { position: relative; display: inline-block; margin-bottom: 12px; }
.pulse-ring {
  position: absolute; inset: -10px; border-radius: 50%;
  border: 2px solid var(--accent-40);
  animation: pulse-ring 2s ease-out infinite;
}
@keyframes pulse-ring {
  0%   { transform: scale(1);   opacity: 0.6; }
  100% { transform: scale(1.4); opacity: 0;   }
}
.mascot-circle {
  width: 100px; height: 100px; border-radius: 50%;
  background: radial-gradient(circle, var(--accent-30), transparent);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.mascot-face {
  font-size: 64px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
  display: inline-block; user-select: none;
  transition: transform 0.1s;
}
.mascot-face.shake { animation: shake 0.4s ease-in-out; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-4px) rotate(-2deg); }
  75%      { transform: translateX(4px)  rotate(2deg);  }
}
.mascot-name { color: rgba(255,255,255,0.9); font-weight: 700; font-size: 16px; margin-bottom: 4px; }
.mascot-msg  { color: var(--accent-cc); font-size: 12px; min-height: 18px; }

/* divider */
.divider {
  height: 1px; margin: 0 20px;
  background: linear-gradient(90deg, transparent, var(--accent-50), transparent);
}

/* karma section */
.karma-section { padding: 16px 20px 20px; position: relative; z-index: 1; }
.karma-label {
  font-size: 11px; color: var(--accent-cc);
  letter-spacing: 2px; margin-bottom: 12px; text-transform: uppercase;
}

/* loading */
.loading { text-align: center; padding: 30px; color: rgba(255,255,255,0.6); font-size: 14px; }
.spin { font-size: 32px; margin-bottom: 12px; display: inline-block; animation: spin-slow 2s linear infinite; }
@keyframes spin-slow { to { transform: rotate(360deg); } }
.loading-sub { font-size: 11px; margin-top: 4px; color: var(--accent-80); }

/* karma card */
.karma-card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  border: 2px solid var(--accent-40);
  padding: 20px;
  animation: slide-up 0.5s ease-out;
  position: relative; overflow: hidden;
}
@keyframes slide-up {
  from { transform: translateY(30px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.shimmer-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  background-size: 200% 100%;
  animation: shimmer 2s linear infinite;
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}
.karma-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
.karma-icon {
  width: 36px; height: 36px; border-radius: 12px;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  box-shadow: 0 0 12px var(--accent-60);
}
.karma-text { color: rgba(255,255,255,0.9); font-size: 15px; line-height: 1.6; }
.btn-next {
  width: 100%; padding: 12px; border-radius: 14px;
  background: linear-gradient(135deg, var(--accent-30), var(--accent-60));
  border: 1px solid var(--accent-80); color: white;
  font-size: 14px; cursor: pointer; font-family: 'Noto Sans Thai', sans-serif;
  font-weight: 600; letter-spacing: 0.5px; transition: background 0.2s ease;
}
.btn-next:active { background: var(--accent-70); }

/* hint */
.hint { text-align: center; color: rgba(255,255,255,0.3); font-size: 11px; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="wrap">
  <div class="card" id="mainCard">
    <div class="particles" id="particles"></div>

    <div class="topbar">
      <div>
        <div class="brand-label">🔮 ดวงดี ชีวิตดี</div>
        <div class="date-label" id="dateLabel"></div>
      </div>
      <div class="day-badge" id="dayBadge"></div>
    </div>

    <div class="mascot-area">
      <div class="glow-ring-wrap">
        <div class="pulse-ring"></div>
        <div class="mascot-circle" onclick="shakeMascot()">
          <div class="mascot-face" id="mascotFace">😤</div>
        </div>
      </div>
      <div class="mascot-name">บุญดวง</div>
      <div class="mascot-msg" id="mascotMsg">แตะบุญดวงเพื่อเปลี่ยนอารมณ์ 😤</div>
    </div>

    <div class="divider"></div>

    <div class="karma-section">
      <div class="karma-label" id="karmaLabel">🙏 กรรมดีประจำวัน</div>
      <div id="karmaContent">
        <div class="loading">
          <div class="spin">🔮</div>
          <div>บุญดวงกำลังพยากรณ์...</div>
          <div class="loading-sub">รอแปปนึงนะ บุญดวงแก่แล้ว</div>
        </div>
      </div>
    </div>
  </div>

  <div class="hint">กรรมดี ชีวิตดี ดวงดี ✨</div>
</div>

<script>
const DAY_THEMES = {
  0: { day:"อาทิตย์", emoji:"☀️", bg:"#FF6B35", accent:"#FFD700",  element:"ไฟ"   },
  1: { day:"จันทร์",  emoji:"🌙", bg:"#4A90D9", accent:"#B8E0FF",  element:"น้ำ"  },
  2: { day:"อังคาร",  emoji:"🔥", bg:"#C0392B", accent:"#FF8A80",  element:"ไฟ"   },
  3: { day:"พุธ",     emoji:"⚡", bg:"#27AE60", accent:"#A8E6CF",  element:"ดิน"  },
  4: { day:"พฤหัส",  emoji:"🌟", bg:"#8E44AD", accent:"#DDA0DD",  element:"ไม้"  },
  5: { day:"ศุกร์",   emoji:"💫", bg:"#E91E8C", accent:"#FFB3D9",  element:"โลหะ" },
  6: { day:"เสาร์",   emoji:"🪐", bg:"#2C3E50", accent:"#95A5A6",  element:"ดิน"  },
};
const MOODS = ["😤","🤨","😏","🧐","😒","🙄","😑"];
const TAP_MSGS = [
  "แค่แตะ ยังขี้เกียจทำกรรมดีเลย 🙄",
  "โอ๊ย แตะเยอะ ดวงไม่ดีขึ้นหรอก 😤",
  "หยุดแตะได้แล้ว ไปทำกรรมดีเถอะ 🧐",
  "บุญดวงเวียนหัวแล้ว 😵",
];

const t = DAY_THEMES[new Date().getDay()];
let taps = 0;

// set CSS vars
const r = document.documentElement;
const hex2 = (h,a) => h + Math.round(parseInt(a)*255/100).toString(16).padStart(2,'0');
r.style.setProperty('--bg',       t.bg);
r.style.setProperty('--bg-aa',    t.bg + 'aa');
r.style.setProperty('--bg-60',    t.bg + '60');
r.style.setProperty('--accent',   t.accent);
r.style.setProperty('--accent-20',t.accent + '20');
r.style.setProperty('--accent-25',t.accent + '25');
r.style.setProperty('--accent-30',t.accent + '30');
r.style.setProperty('--accent-40',t.accent + '40');
r.style.setProperty('--accent-50',t.accent + '50');
r.style.setProperty('--accent-60',t.accent + '60');
r.style.setProperty('--accent-70',t.accent + '70');
r.style.setProperty('--accent-80',t.accent + '80');
r.style.setProperty('--accent-cc',t.accent + 'cc');

document.body.style.background =
  `radial-gradient(ellipse at 20% 20%, ${t.bg}dd, ${t.bg}88 50%, #0a0a0a)`;

// date
document.getElementById('dateLabel').textContent =
  new Date().toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('dayBadge').textContent = t.emoji + ' ' + t.day;
document.getElementById('karmaLabel').textContent = '🙏 กรรมดีประจำวัน' + t.emoji;

// particles
const pc = document.getElementById('particles');
for(let i=0;i<12;i++){
  const d = document.createElement('div');
  d.className = 'particle';
  const sz = i%3===0?'8px':'5px';
  d.style.cssText = `width:${sz};height:${sz};opacity:${0.3+(i%4)*0.1};`+
    `left:${(i*37+10)%90}%;top:${(i*53+5)%85}%;`+
    `--dur:${3+(i%3)}s;--delay:${(i*0.4).toFixed(1)}s;`;
  pc.appendChild(d);
}

// mascot
function shakeMascot(){
  const f = document.getElementById('mascotFace');
  f.textContent = MOODS[Math.floor(Math.random()*MOODS.length)];
  f.classList.remove('shake');
  void f.offsetWidth;
  f.classList.add('shake');
  setTimeout(()=>f.classList.remove('shake'),400);
  taps++;
  document.getElementById('mascotMsg').textContent =
    taps <= TAP_MSGS.length ? TAP_MSGS[taps-1] : TAP_MSGS[TAP_MSGS.length-1];
}

// karma
async function generateKarma(){
  shakeMascot();
  document.getElementById('karmaContent').innerHTML = `
    <div class="loading">
      <div class="spin">🔮</div>
      <div>บุญดวงกำลังพยากรณ์...</div>
      <div class="loading-sub">รอแปปนึงนะ บุญดวงแก่แล้ว</div>
    </div>`;
  try {
    const res = await fetch('/api/karma',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ day: t.day, element: t.element })
    });
    const data = await res.json();
    const text = data.result || data.error || 'ระบบงง ลองใหม่ครับ 🙏';
    document.getElementById('karmaContent').innerHTML = `
      <div class="karma-card">
        <div class="shimmer-bar"></div>
        <div class="karma-row">
          <div class="karma-icon">🙏</div>
          <div class="karma-text">${text}</div>
        </div>
        <button class="btn-next" onclick="generateKarma()">✨ ขอใหม่อีกอัน</button>
      </div>`;
  } catch(e){
    document.getElementById('karmaContent').innerHTML = `
      <div class="karma-card">
        <div class="shimmer-bar"></div>
        <div class="karma-row">
          <div class="karma-icon">🙏</div>
          <div class="karma-text">เน็ตแกมีปัญหา... นั่นแหละ กรรมเก่าแล้ว 😤</div>
        </div>
        <button class="btn-next" onclick="generateKarma()">✨ ลองใหม่</button>
      </div>`;
  }
}

generateKarma();
</script>
</body>
</html>
